name: Infrastructure Keep Alive

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 */2 * *'

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Supabase
        run: |
          PGPASSWORD="${{ secrets.SUPABASE_DB_PASSWORD }}" psql \
            -h aws-1-ap-southeast-2.pooler.supabase.com \
            -p 6543 \
            -U postgres.aaolafhyxxhfdurmvcdg \
            -d postgres \
            -c "SELECT 1"

      - name: Ping Upstash
        run: |
          curl --fail \
          -H "Authorization: Bearer ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}" \
          "${{ secrets.UPSTASH_REDIS_REST_URL }}/set/heartbeat/$(date +%s)"
