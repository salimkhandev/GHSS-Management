name: Infrastructure Keep Alive
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase Project
        run: |
          curl --fail \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            "https://aaolafhyxxhfdurmvcdg.supabase.co/rest/v1/?limit=1"
      - name: Ping Upstash
        run: |
          curl --fail \
            -H "Authorization: Bearer ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}" \
            "${{ secrets.UPSTASH_REDIS_REST_URL }}/set/heartbeat/$(date +%s)"
